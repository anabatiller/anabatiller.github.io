<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link rel="stylesheet" href="styles.css">
<script>
  (function(){ try{ if(!window.matchMedia('(prefers-reduced-motion: reduce)').matches){ document.documentElement.classList.add('js-anim'); } }catch(e){} })();
</script>
<script src="image-slot.js"></script>
<script src="motion.js"></script>
</helmet>

<!-- =====================================================================
     CASE SHELL · master chrome for every case study (Ana Batiller)
     ---------------------------------------------------------------------
     Wraps a case's content in the shared back-nav + contact footer and
     wires the motion engine. Case studies stay content-only:

       <dc-import name="Case Shell" accent="#6E82DB">
         <section data-screen-label="Case 0N — Title"> … </section>
       </dc-import>

     Edit the header / footer / motion here → every case updates.
     ===================================================================== -->
<div style="font-family:'DM Sans',sans-serif; position:relative;">

  <header style="max-width:1180px; margin:0 auto; padding:clamp(28px,5vw,56px) clamp(24px,5vw,64px) 0;">
    <a class="ablink" data-magnetic="" href="Ana%20Batiller%20-%20Case%20Studies.dc.html" style="display:inline-flex; align-items:center; gap:9px;"><span style="width:17px; height:17px; border-radius:50%; background:var(--accent); filter:blur(6px); opacity:.85;"></span>back to work</a>
  </header>

  {{ children }}

  <dc-import name="Site Footer" hint-size="100%,420px"></dc-import>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#6E82DB&quot;,&quot;options&quot;:[&quot;#6E82DB&quot;,&quot;#9E8D35&quot;,&quot;#C2614A&quot;,&quot;#5B8C7B&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;motionLevel&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;full&quot;,&quot;subtle&quot;],&quot;default&quot;:&quot;full&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() { return { children: this.props.children }; }

  componentDidMount() {
    const run = () => {
      if (window.ABMotion && window.ABMotion.initMotion) window.ABMotion.initMotion(this.props || {});
      else setTimeout(run, 30);
    };
    run();
  }
}
</script>
</body>
</html>
